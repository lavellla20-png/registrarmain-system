version: '3.9'
services:
  db:
    image: mysql:8.0
    container_name: registrar_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: enrollment_system
      MYSQL_USER: enroll_user
      MYSQL_PASSWORD: enroll_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: registrar_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: registrar_backend
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: registrar_frontend
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "80:80"

  volumes:
  mysql_data:
